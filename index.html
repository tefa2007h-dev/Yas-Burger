<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YAS Burger Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yas-red: #E31E24; --yas-yellow: #FFD200; --dark-bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        
        .section-title { color: var(--yas-yellow); border-bottom: 2px solid var(--yas-red); display: inline-block; margin: 30px 0 15px; font-size: 1.8rem; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; text-align: center; border: 1px solid #333; padding-bottom: 10px; }
        .item-card img { width: 100%; height: 150px; object-fit: cover; }
        .item-card h3 { font-size: 1.1rem; margin: 10px 0 5px; color: #fff; }
        .price { color: var(--yas-yellow); font-weight: bold; font-size: 1.2rem; }

        /* تنسيق الصوصات */
        .sauces-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .sauce-item { text-align: center; width: 80px; }
        .sauce-item img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--yas-yellow); object-fit: cover; }
        .sauce-item p { font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center;">
        <img src="logo.png" style="width:150px;" alt="Logo">
    </div>

    <h2 class="section-title">البرجر (Burgers)</h2>
    <div class="menu-grid">
        <div class="item-card">
            <img src="اسم_صورة_ياس_برجر_هنا" alt="YAS Burger">
            <h3>ياس برجر</h3>
            <div class="price">00 LE</div>
        </div>
        <div class="item-card">
            <img src="اسم_صورة_تشيكن_رانش_هنا" alt="Chicken Ranch">
            <h3>تشيكن رانش</h3>
            <div class="price">00 LE</div>
        </div>
        <div class="item-card">
            <img src="اسم_صورة_مشروم_هنا" alt="Mushroom Burger">
            <h3>مشروم برجر</h3>
            <div class="price">00 LE</div>
        </div>
        <div class="item-card">
            <img src="اسم_صورة_بيف_كلاسيك_هنا" alt="Beef Classic">
            <h3>بيف كلاسيك</h3>
            <div class="price">00 LE</div>
        </div>
    </div>

    <h2 class="section-title">المقبلات والبطاطس</h2>
    <div class="menu-grid">
        <div class="item-card">
            <img src="اسم_صورة_لوديد_فرايز_هنا" alt="Loaded Fries">
            <h3>لوديد فرايز</h3>
            <div class="price">00 LE</div>
        </div>
        <div class="item-card">
            <img src="اسم_صورة_موزاريلا_هنا" alt="Mozzarella">
            <h3>أصابع موزاريلا</h3>
            <div class="price">00 LE</div>
        </div>
    </div>

    <h2 class="section-title">الصوصات (Extra)</h2>
    <div class="sauces-container">
        <div class="sauce-item">
            <img src="اسم_صورة_الكاتشب_هنا">
            <p>كاتشب</p>
        </div>
        <div class="sauce-item">
            <img src="اسم_صورة_الرانش_هنا">
            <p>رانش</p>
        </div>
        <div class="sauce-item">
            <img src="اسم_صورة_الجبنة_هنا">
            <p>جبنة</p>
        </div>
    </div>
</div>

</body>
</html>
